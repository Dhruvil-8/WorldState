# ============================================================
# WorldState — Docker Compose
# Single-command startup: docker compose up
# ============================================================

services:
  # ── PostgreSQL 16 + Apache AGE ──────────────────────────────
  postgres:
    build:
      context: ./infrastructure/postgres
      dockerfile: Dockerfile
    container_name: ws-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-worldstate}
      POSTGRES_USER: ${POSTGRES_USER:-worldstate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./backend/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldstate} -d ${POSTGRES_DB:-worldstate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worldstate

  # ── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ws-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password} --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worldstate

  # ── Meilisearch ─────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ws-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme_meili_master_key}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_DB_PATH: /meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worldstate

  # ── NATS ────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: ws-nats
    restart: unless-stopped
    command: ["--config", "/etc/nats/nats-server.conf"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - ./infrastructure/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - worldstate

  # ── Go Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ws-backend
    restart: unless-stopped
    environment:
      - BACKEND_ENV=${BACKEND_ENV:-development}
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-worldstate}
      - POSTGRES_USER=${POSTGRES_USER:-worldstate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_postgres_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_password}
      - MEILI_HOST=meilisearch
      - MEILI_PORT=7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme_meili_master_key}
      - NATS_HOST=nats
      - NATS_PORT=4222
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - worldstate

  # ── Python AI Layer ─────────────────────────────────────────
  ai:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: ws-ai
    restart: unless-stopped
    environment:
      - AI_ENV=${AI_ENV:-development}
      - AI_PORT=${AI_PORT:-8000}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - PYTHONPATH=src
      - BACKEND_URL=http://backend:8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-worldstate}
      - POSTGRES_USER=${POSTGRES_USER:-worldstate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_postgres_password}
      - NATS_HOST=nats
      - NATS_PORT=4222
      - MEILI_HOST=meilisearch
      - MEILI_PORT=7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme_meili_master_key}
    ports:
      - "${AI_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      nats:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - worldstate

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ws-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8080}
      - NEXT_PUBLIC_AI_URL=http://localhost:${AI_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - worldstate

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  nats_data:

networks:
  worldstate:
    driver: bridge
