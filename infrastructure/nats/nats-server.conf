# ============================================================
# WorldState — NATS Server Configuration
# ============================================================

# Server name
server_name: worldstate-nats

# Client connections
port: 4222

# HTTP monitoring
http_port: 8222

# JetStream (persistent messaging)
jetstream {
  store_dir: /data/jetstream
  max_mem: 64MB
  max_file: 1GB
}

# Logging
debug: false
trace: false
logtime: true

# Limits
max_payload: 1MB
max_connections: 1024

# Timeouts
ping_interval: 60s
ping_max: 3
write_deadline: 10s
